name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt ruff
      - name: Lint (ruff — errors only)
        # Focus on real defects (syntax errors, undefined names, unused imports)
        # rather than style; legacy code carries many cosmetic nits.
        run: ruff check --select E9,F63,F7,F82,F401 custom_components/bmw_cardata
      - name: Run tests
        run: pytest tests/ -q
